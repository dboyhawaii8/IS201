<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Snake Game</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      color: #fff;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 70, 70, 0.18) 0 40px, transparent 41px),
        radial-gradient(circle at 85% 18%, rgba(255, 80, 80, 0.16) 0 34px, transparent 35px),
        radial-gradient(circle at 20% 80%, rgba(255, 90, 90, 0.14) 0 36px, transparent 37px),
        radial-gradient(circle at 82% 78%, rgba(255, 70, 70, 0.16) 0 44px, transparent 45px),
        radial-gradient(circle at 50% 10%, rgba(130, 200, 90, 0.22) 0 120px, transparent 121px),
        radial-gradient(circle at 50% 90%, rgba(90, 170, 70, 0.20) 0 140px, transparent 141px),
        repeating-linear-gradient(
          45deg,
          rgba(255,255,255,0.03) 0 12px,
          rgba(255,255,255,0) 12px 24px
        ),
        linear-gradient(180deg, #1f4d2e 0%, #2f6b3f 45%, #18361f 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 25% 30%, rgba(120, 255, 140, 0.08), transparent 180px),
        radial-gradient(circle at 75% 65%, rgba(255, 120, 120, 0.08), transparent 220px),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.04), transparent 280px);
    }

    .back-button {
      position: fixed;
      top: 20px;
      right: 20px;
      display: inline-block;
      padding: 12px 18px;
      background: linear-gradient(180deg, #ffffff 0%, #f2fff0 100%);
      color: #1f4d2e;
      text-decoration: none;
      font-weight: bold;
      border-radius: 10px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.20);
      z-index: 1000;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .back-button:hover {
      background: linear-gradient(180deg, #f7fff0 0%, #e3f6da 100%);
      transform: translateY(-2px);
    }

    .game-wrap {
      text-align: center;
      background: rgba(20, 35, 20, 0.82);
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(4px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      color: #f7fff0;
    }

    p {
      margin: 6px 0;
      color: #dbeed6;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    canvas {
      background: linear-gradient(180deg, #8fd16a 0%, #6fba52 100%);
      border: 4px solid #dff5d8;
      border-radius: 10px;
      display: block;
      margin: 16px auto 12px;
      box-shadow: inset 0 0 0 3px rgba(0, 0, 0, 0.08);
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #startBtn {
      background: #43a047;
    }

    #startBtn:hover {
      background: #2e7d32;
    }

    #restart {
      background: #ff5a5a;
    }

    #restart:hover {
      background: #e04848;
    }

    .status {
      min-height: 24px;
      font-weight: bold;
      color: #f7fff0;
    }
  </style>
</head>
<body>
  <a href="fromscratch.html" class="back-button">Back to Scratch Page</a>

  <div class="game-wrap">
    <h1>Snake Game</h1>
    <p><strong>Controls:</strong> WASD or Arrow Keys</p>
    <p>Score: <span id="score">0</span></p>
    <p class="status" id="status">Click Start Game to begin</p>
    <canvas id="game" width="400" height="400"></canvas>

    <div class="button-row">
      <button id="startBtn">Start Game</button>
      <button id="restart">Restart</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const restartBtn = document.getElementById("restart");
    const startBtn = document.getElementById("startBtn");
    const statusEl = document.getElementById("status");

    const box = 20;
    const rows = canvas.width / box;
    const cols = canvas.height / box;

    let snake;
    let food;
    let dx;
    let dy;
    let score;
    let gameOver;
    let gameStarted = false;
    let gameLoop = null;

    function startGame(resetScore = true) {
      snake = [
        { x: 9 * box, y: 10 * box },
        { x: 8 * box, y: 10 * box },
        { x: 7 * box, y: 10 * box }
      ];

      food = randomFood();
      dx = box;
      dy = 0;
      gameOver = false;
      gameStarted = true;

      if (resetScore) {
        score = 0;
      }

      scoreEl.textContent = score;
      statusEl.textContent = "Game in progress";
      startBtn.disabled = true;
      startBtn.style.opacity = "0.6";
      startBtn.style.cursor = "not-allowed";

      clearInterval(gameLoop);
      gameLoop = setInterval(update, 120);

      draw();
    }

    function resetGame() {
      clearInterval(gameLoop);
      score = 0;
      scoreEl.textContent = score;
      gameStarted = false;
      gameOver = false;
      startBtn.disabled = false;
      startBtn.style.opacity = "1";
      startBtn.style.cursor = "pointer";
      statusEl.textContent = "Click Start Game to begin";

      snake = [
        { x: 9 * box, y: 10 * box },
        { x: 8 * box, y: 10 * box },
        { x: 7 * box, y: 10 * box }
      ];

      food = randomFood();
      dx = box;
      dy = 0;
      drawStartScreen();
    }

    function randomFood() {
      return {
        x: Math.floor(Math.random() * cols) * box,
        y: Math.floor(Math.random() * rows) * box
      };
    }

    function drawGrid() {
      ctx.strokeStyle = "rgba(255, 255, 255, 0.12)";
      for (let i = 0; i <= canvas.width; i += box) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
      }
      for (let i = 0; i <= canvas.height; i += box) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvas.width, i);
        ctx.stroke();
      }
    }

    function drawApple(x, y) {
      ctx.fillStyle = "#e53935";
      ctx.beginPath();
      ctx.arc(x + box / 2, y + box / 2 + 1, box / 2.6, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#5d4037";
      ctx.fillRect(x + box / 2 - 1, y + 3, 2, 5);

      ctx.fillStyle = "#43a047";
      ctx.beginPath();
      ctx.ellipse(x + box / 2 + 4, y + 5, 4, 2.5, -0.6, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawSnakeSegment(segment, isHead) {
      ctx.fillStyle = isHead ? "#1b5e20" : "#2e7d32";
      ctx.fillRect(segment.x + 1, segment.y + 1, box - 2, box - 2);

      if (isHead) {
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(segment.x + 6, segment.y + 7, 2, 0, Math.PI * 2);
        ctx.arc(segment.x + 14, segment.y + 7, 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#111";
        ctx.beginPath();
        ctx.arc(segment.x + 6, segment.y + 7, 1, 0, Math.PI * 2);
        ctx.arc(segment.x + 14, segment.y + 7, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawApple(food.x, food.y);

      for (let i = 0; i < snake.length; i++) {
        drawSnakeSegment(snake[i], i === 0);
      }
    }

    function drawStartScreen() {
      draw();

      ctx.fillStyle = "rgba(0, 0, 0, 0.28)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.font = "bold 30px Arial";
      ctx.fillText("Snake Game", canvas.width / 2, canvas.height / 2 - 20);

      ctx.font = "18px Arial";
      ctx.fillText("Press Start Game below", canvas.width / 2, canvas.height / 2 + 15);

      ctx.font = "16px Arial";
      ctx.fillText("Use WASD or Arrow Keys", canvas.width / 2, canvas.height / 2 + 45);
    }

    function update() {
      if (gameOver || !gameStarted) return;

      const head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
      };

      if (
        head.x < 0 ||
        head.y < 0 ||
        head.x >= canvas.width ||
        head.y >= canvas.height ||
        snake.some(segment => segment.x === head.x && segment.y === head.y)
      ) {
        gameOver = true;
        gameStarted = false;
        clearInterval(gameLoop);
        startBtn.disabled = false;
        startBtn.style.opacity = "1";
        startBtn.style.cursor = "pointer";
        statusEl.textContent = "Game over - click Start Game to play again";

        draw();
        ctx.fillStyle = "rgba(0, 0, 0, 0.45)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "32px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2);
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        food = randomFood();

        while (snake.some(segment => segment.x === food.x && segment.y === food.y)) {
          food = randomFood();
        }
      } else {
        snake.pop();
      }

      draw();
    }

    document.addEventListener("keydown", (e) => {
      if (!gameStarted) return;

      const goingUp = dy === -box;
      const goingDown = dy === box;
      const goingLeft = dx === -box;
      const goingRight = dx === box;

      if ((e.code === "KeyW" || e.code === "ArrowUp") && !goingDown) {
        dx = 0;
        dy = -box;
      } else if ((e.code === "KeyS" || e.code === "ArrowDown") && !goingUp) {
        dx = 0;
        dy = box;
      } else if ((e.code === "KeyA" || e.code === "ArrowLeft") && !goingRight) {
        dx = -box;
        dy = 0;
      } else if ((e.code === "KeyD" || e.code === "ArrowRight") && !goingLeft) {
        dx = box;
        dy = 0;
      }
    });

    startBtn.addEventListener("click", () => {
      startGame(true);
    });

    restartBtn.addEventListener("click", () => {
      resetGame();
    });

    resetGame();
  </script>
</body>
</html>
